<!DOCTYPE html>
<html>
<head>
    <title>College Admission Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #e6f0ff;
        }

        .container {
            width: 420px;
            margin: 30px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        img {
            width: 100%;
            height: 160px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #aaa;
            border-radius: 5px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #3399ff;
        }

        .gender {
            width: auto;
            margin-right: 5px;
        }

        .gender-group {
            margin-top: 5px;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 10px;
            background-color: #3399ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #267acc;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Internet Image -->
        <img src="https://images.unsplash.com/photo-1577896851231-70ef18881754" alt="College">

        <h2>College Admission Form</h2>

        <form>

            <label>Full Name:</label>
            <input type="text" required>

            <label>Date of Birth:</label>
            <input type="date" required>

            <label>Gender:</label>
            <div class="gender-group">
                <input type="radio" name="gender" class="gender"> Male
                <input type="radio" name="gender" class="gender"> Female
                <input type="radio" name="gender" class="gender"> Other
            </div>

            <label>Email:</label>
            <input type="email" required>

            <label>Phone Number:</label>
            <input type="text" required>

            <label>Address:</label>
            <textarea rows="3"></textarea>

            <label>Course:</label>
            <select>
                <option>Select Course</option>
                <option>BCA</option>
                <option>BBA</option>
                <option>B.Tech</option>
                <option>B.Sc</option>
            </select>

            <label>12th Percentage:</label>
            <input type="text" required>

            <button type="submit">Submit</button>

        </form>

    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Instagram Post</title>

    <style>
        body {
            font-family: Arial;
            background-color: #fafafa;
        }

        .post {
            width: 400px;
            margin: 30px auto;
            border: 1px solid #dbdbdb;
            background-color: white;
        }

        .header {
            padding: 10px;
        }

        .profile-pic {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            vertical-align: middle;
        }

        .username {
            font-weight: bold;
            margin-left: 8px;
        }

        .dots {
            float: right;
        }

        .post-img {
            width: 100%;
        }

        .icons {
            padding: 10px;
            font-size: 20px;
        }

        .likes {
            padding: 0 10px;
            font-weight: bold;
        }

        .caption {
            padding: 5px 10px;
        }

        .time {
            padding: 5px 10px 10px 10px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="post">

    <!-- Header -->
    <div class="header">
        <img src="https://i.pravatar.cc/40" class="profile-pic">
        <span class="username">msdhoni</span>
        <span class="dots">⋮</span>
    </div>

    <!-- Post Image -->
    <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc" class="post-img">

    <!-- Icons -->
    <div class="icons">
        ❤️ 💬 📤 🔖
    </div>

    <!-- Likes -->
    <div class="likes">
        1,245,678 likes
    </div>

    <!-- Caption -->
    <div class="caption">
        <b>msdhoni</b> Finisher. Leader. Legend. 💛🔥 #MSD
    </div>

    <!-- Time -->
    <div class="time">
        2 hours ago
    </div>

</div>

</body>
</html>
